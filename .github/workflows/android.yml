name: Build & Release APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1

      - name: List APK outputs
        run: find app/build/outputs/apk -name '*.apk' -ls 2>&1 || echo 'No APK found'

      - name: Generate version tag
        id: version
        run: echo "TAG_NAME=v1.0.0-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: "BabyMomo ${{ steps.version.outputs.TAG_NAME }}"
          body: |
            ## BabyMomo — AI Companion for Android

            Private AI companion with bi-temporal memory, on-device inference, and interactive UI generation.

            ### Features
            - Streaming chat with memory citations
            - 4-type memory system (Working, Episodic, Semantic, Procedural)
            - Memory promotion (hitCount >= 5 → permanent context)
            - LLM provider chain (Local → Remote → Mock)
            - OpenAI / NVIDIA NIM / OpenRouter support
            - 5 specialist agents + 6 skills + 5 tools
            - Interactive AI-generated screens
            - Linux sandbox (proot Alpine)
            - Heartbeat autonomous check-ins
            - SQLCipher encrypted database
            - Dark purple theme
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
